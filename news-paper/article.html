<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>記事 | 三浦新聞</title>
  <meta
    name="description"
    content="創作作品内に登場する架空ニュースサイトの個別記事ページです。"
  />
  <style>
    :root {
      --bg: #f7f6f2;
      --paper: #ffffff;
      --ink: #1e1e1e;
      --muted: #666666;
      --line: #d9d4cb;
      --fiction-bg: #3a3a3a;
      --fiction-ink: #e6e6e6;
      --max: 980px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding-top: 34px;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.8;
      letter-spacing: 0.02em;
    }

    a { color: inherit; text-decoration: none; }

    .fiction-notice {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      background: var(--fiction-bg);
      color: var(--fiction-ink);
      font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
      font-size: 0.72rem;
      line-height: 1.4;
      text-align: center;
    }

    .site-header {
      background: var(--paper);
      border-bottom: 2px solid #222;
    }

    .site-header-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 24px 20px 18px;
      text-align: center;
    }

    .site-kicker {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: 0.12em;
    }

    .global-nav {
      border-top: 1px solid var(--line);
      background: #fcfbf8;
    }

    .global-nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      gap: 22px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .global-nav a { display: inline-block; padding: 13px 0; font-size: 0.95rem; }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .article {
      min-height: 280px;
      padding: 28px;
      border: 1px solid var(--line);
      background: var(--paper);
    }

    .article-title {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      line-height: 1.45;
    }

    .article-body {
      margin-top: 24px;
      color: var(--muted);
    }

    .site-footer {
      border-top: 1px solid var(--line);
      background: #ebe7df;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .site-footer-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 22px 20px;
    }

    @media (max-width: 600px) {
      body { padding-top: 42px; }
      .fiction-notice { min-height: 42px; font-size: 11px; }
      .page { padding: 22px 16px 40px; }
      .article { padding: 22px 16px 26px; }
    }
  </style>
</head>

<body>
  <div class="fiction-notice">
    FICTION ｜ このページは創作作品内の架空ニュースUIです。実在の報道機関・団体とは関係ありません。
  </div>

  <header class="site-header">
    <div class="site-header-inner">
      <p class="site-kicker">LOCAL NEWS OF MIURA AREA</p>
      <h1 class="site-title"><a href="index.html">三浦新聞</a></h1>
    </div>

    <nav class="global-nav" aria-label="グローバルナビゲーション">
      <div class="global-nav-inner">
        <a href="index.html">トップ</a>
        <a href="index.html#category-region">地域</a>
        <a href="index.html#category-social">社会</a>
        <a href="index.html#category-incident">事件</a>
        <a href="index.html#category-school">学校</a>
        <a href="index.html#category-medical">医療</a>
        <a href="index.html#paper-info">暮らし</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <article class="article">
      <h2 class="article-title">記事</h2>
      <div class="article-body">
        <!-- 今後、新聞記事本文をここに追加する -->
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      このニュースサイトおよび掲載記事は、創作作品の演出として制作された架空のものです。
      人物・施設・風景等の画像が使用される場合、AI生成画像または加工画像を含みます。
    </div>
  </footer>
</body>
</html>
